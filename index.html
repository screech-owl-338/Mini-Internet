<script>
// Load navbar.html into the #navbar div
fetch('navbar.html')
  .then(response => {
    if (!response.ok) throw new Error("Navbar file not found");
    return response.text();
  })
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  })
  .catch(error => {
    console.error("Error loading navbar:", error);
  });

	const calendarGrid = document.getElementById('calendar-grid');
        let startDate = new Date();

        // Helper function to safely get a local YYYY-MM-DD string
        function getLocalDateString(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        function initGrid() {
            calendarGrid.innerHTML = '';
            startDate = new Date();
            startDate.setDate(startDate.getDate() - startDate.getDay());
            startDate.setHours(0, 0, 0, 0);

            for (let i = 0; i < 14; i++) {
                const currentDate = new Date(startDate);
                currentDate.setDate(startDate.getDate() + i);
                
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                // Use the local date string helper
                dayDiv.id = `day-${getLocalDateString(currentDate)}`;
                
                const dayNum = document.createElement('div');
                dayNum.className = 'day-number';
                dayNum.textContent = currentDate.getDate();
                
                dayDiv.appendChild(dayNum);
                calendarGrid.appendChild(dayDiv);
            }
        }

        function loadFileCalendar() {
            const fileInput = document.getElementById('ics-file');
            const file = fileInput.files[0];
            if (!file) return alert('Please select an .ics file first.');

            showStatus('Reading local file...');
            initGrid();

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const events = parseICS(text);
                renderEvents(events);
                hideStatus();
            };
            reader.onerror = function() {
                alert('Error reading file.');
                hideStatus();
            };
            reader.readAsText(file);
        }

        async function loadUrlCalendar() {
            const url = document.getElementById('ics-url').value;
            if (!url) return alert('Please enter a URL');

            showStatus('Fetching remote calendar...');
            initGrid();

            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const icsData = await response.text();
                
                const events = parseICS(icsData);
                renderEvents(events);
            } catch (error) {
                console.error(error);
                alert('Failed to fetch. Verify the URL is valid or use the Local File preview option.');
            } finally {
                hideStatus();
            }
        }

        function parseICS(icsString) {
            const events = [];
            const lines = icsString.split(/\r?\n/);
            let currentEvent = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                while (i + 1 < lines.length && (lines[i+1].startsWith(' ') || lines[i+1].startsWith('\t'))) {
                    i++;
                    line += lines[i].substring(1);
                }

                if (line.startsWith('BEGIN:VEVENT')) {
                    currentEvent = {};
                } else if (line.startsWith('END:VEVENT')) {
                    if (currentEvent && currentEvent.start) {
                        events.push(currentEvent);
                    }
                    currentEvent = null;
                } else if (currentEvent) {
                    if (line.startsWith('SUMMARY:')) {
                        currentEvent.summary = line.substring(8);
                    } else if (line.startsWith('DTSTART')) {
                        const dateString = line.split(':')[1];
                        if (dateString) currentEvent.start = parseICSDate(dateString);
                    }
                }
            }
            return events;
        }

        // Updated "Floating Time" Parser
        function parseICSDate(icsDate) {
            const year = parseInt(icsDate.substring(0, 4));
            const month = parseInt(icsDate.substring(4, 6)) - 1;
            const day = parseInt(icsDate.substring(6, 8));
            
            if (icsDate.includes('T')) {
                const hour = parseInt(icsDate.substring(9, 11));
                const minute = parseInt(icsDate.substring(11, 13));
                const second = parseInt(icsDate.substring(13, 15));
                // Creates date purely in local time, ignoring original timezone
                return new Date(year, month, day, hour, minute, second);
            }
            return new Date(year, month, day);
        }

        function renderEvents(events) {
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + 14);

            events.forEach(event => {
                if (event.start >= startDate && event.start < endDate) {
                    // Match directly with our local date string helper
                    const dayId = `day-${getLocalDateString(event.start)}`;
                    
                    const dayCell = document.getElementById(dayId);
                    if (dayCell) {
                        const eventDiv = document.createElement('div');
                        eventDiv.className = 'event';
                        
                        let timeString = '';
                        if (event.start.getHours() !== 0 || event.start.getMinutes() !== 0) {
                            timeString = event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ' - ';
                        }
                        
                        eventDiv.textContent = `${timeString}${event.summary || 'Busy'}`;
                        dayCell.appendChild(eventDiv);
                    }
                }
            });
        }

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('status-msg').style.display = 'none';
        }

        // Build grid on start
        initGrid();
</script>
