        <img id="navPfp" 
             src="" 
             alt="Profile" 
             style="width:40px;height:40px;border-radius:50%;display:none;">

        <span id="navUsername" 
              style="font-weight:bold;display:none;"></span>

<script>
function getCookie(name) {
  const cname = name + "=";
  const decoded = decodeURIComponent(document.cookie);
  const parts = decoded.split(";");
  for (let p of parts) {
    p = p.trim();
    if (p.indexOf(cname) === 0) {
      return p.substring(cname.length);
    }
  }
  return "";
}

window.addEventListener("DOMContentLoaded", () => {
  const pfp = getCookie("pfp");
  const username = getCookie("username");

  // Show profile picture
  if (pfp && pfp !== "undefined" && pfp !== "") {
    const img = document.getElementById("navPfp");
    img.src = pfp;
    img.style.display = "inline-block";
  }

  // Show username
  if (username && username !== "undefined" && username !== "") {
    const nameEl = document.getElementById("navUsername");
    nameEl.textContent = username;
    nameEl.style.display = "inline-block";
  }
});
</script>
